services:
  - type: web
    name: medchain-backend
    env: node
    nodeVersion: 20.18.0
    region: ohio
    plan: free
    buildCommand: npm install --prefix ehr-blockchain/backend
    startCommand: npm start --prefix ehr-blockchain/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://your-vercel-domain.vercel.app
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
